<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/styles.css">
</head>
<body>
  {% include header.html %}
  
  <main>
    <article class="post">
      <header>
        <h1>{{ page.title }}</h1>

        {% if page.date %}
        <p class="post-meta">
          {{ page.date | date: "%B %d, %Y" }}
        </p>
        {% endif %}
      </header>
      
      <section class="post-content">
        {{ content }}
      </section>
    </article>
  </main>
  
  {% include footer.html %}
</body>
</html>
